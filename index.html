<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangkap Jawapan Betul MBPK</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 480px;
            height: 360px;
            background-color: #87CEEB; /* Sky blue */
            border: 5px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .variable-display {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 14px;
            font-weight: bold;
            pointer-events: auto;
        }
        #markah-display { top: 10px; left: 10px; color: #d32f2f; }
        #soalan-display { top: 10px; left: 50%; transform: translateX(-50%); font-size: 20px; background: white; padding: 5px 15px; border: 2px solid #333; }
        #bilangan-display { top: 10px; right: 10px; color: #1976d2; }
        #tahap-display { top: 40px; right: 10px; color: #388e3c; }

        .say-bubble {
            position: absolute;
            background: white;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 8px 12px;
            font-size: 14px;
            max-width: 200px;
            text-align: center;
            pointer-events: none;
            display: none;
        }
        .say-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }
        .say-bubble::before {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 11px 11px 0;
            border-style: solid;
            border-color: #333 transparent transparent;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            color: white;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        #exit-btn { background: #f44336; margin-left: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="480" height="360"></canvas>

    <div id="ui-overlay">
        <div id="markah-display" class="variable-display">Markah: 0</div>
        <div id="soalan-display" class="variable-display">Tekan MULA</div>
        <div id="bilangan-display" class="variable-display">Soalan: 0/10</div>
        <div id="tahap-display" class="variable-display">Tahap: 1</div>

        <div id="rabbit-say" class="say-bubble"></div>
        <div id="apple1-say" class="say-bubble"></div>
        <div id="apple2-say" class="say-bubble"></div>
        <div id="apple3-say" class="say-bubble"></div>
    </div>

    <div id="start-screen">
        <h2 style="margin: 0 20px;">TANGKAP JAWAPAN BETUL</h2>
        <p style="margin: 10px 20px;">Bantu watak menangkap jawapan yang betul.</p>
        <button id="start-btn">MULA</button>
    </div>

    <div id="game-over-screen" style="display: none;">
        <h2 id="final-score-text">TAHNIAH!</h2>
        <div style="display: flex;">
            <button id="restart-btn">MAIN SEMULA</button>
            <button id="exit-btn">KELUAR</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game State
    let gameState = 'START'; // START, PLAYING, GAMEOVER
    let Markah = 0;
    let BilanganSoalan = 0;
    let Tahap = 1;
    let BetulBerturut = 0;
    let Soalan = "Tekan MULA";
    let JawapanBetul = 0;
    let CorrectPos = 1;
    let Wrong1 = 0;
    let Wrong2 = 0;
    let ApplesMissed = 0;

    // Sprites
    const rabbit = {
        x: 0, // Center based coordinates (-240 to 240)
        y: -120, // (-180 to 180)
        width: 40,
        height: 40,
        emoji: '🐰',
        say: '',
        sayTimer: 0
    };

    const apples = [
        { id: 1, x: -150, y: 180, val: 0, active: false, emoji: '🍎', sayTimer: 0 },
        { id: 2, x: 0, y: 180, val: 0, active: false, emoji: '🍎', sayTimer: 0 },
        { id: 3, x: 150, y: 180, val: 0, active: false, emoji: '🍎', sayTimer: 0 }
    ];

    // Controls
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Elements
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const exitBtn = document.getElementById('exit-btn');
    const rabbitSay = document.getElementById('rabbit-say');

    // Button Listeners
    startBtn.onclick = startGame;
    restartBtn.onclick = startGame;
    exitBtn.onclick = () => window.close();

    function startGame() {
        Markah = 0;
        BilanganSoalan = 0;
        Tahap = 1;
        BetulBerturut = 0;
        gameState = 'PLAYING';
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        rabbit.x = 0;
        rabbit.say = "";
        nextQuestion();
    }

    function nextQuestion() {
        if (BilanganSoalan >= 10) {
            endGame();
            return;
        }

        if (Tahap === 1) {
            let n1 = Math.floor(Math.random() * 5) + 1;
            let n2 = Math.floor(Math.random() * 5) + 1;
            JawapanBetul = n1 + n2;
            Soalan = `${n1} + ${n2} = ?`;
        } else if (Tahap === 2) {
            let n1 = Math.floor(Math.random() * 10) + 1;
            let n2 = Math.floor(Math.random() * 10) + 1;
            JawapanBetul = n1 + n2;
            Soalan = `${n1} + ${n2} = ?`;
        } else {
            let n1 = Math.floor(Math.random() * 6) + 5; // 5-10
            let n2 = Math.floor(Math.random() * (n1 - 1)) + 1; // 1 to n1-1
            JawapanBetul = n1 - n2;
            Soalan = `${n1} - ${n2} = ?`;
        }

        CorrectPos = Math.floor(Math.random() * 3) + 1;
        Wrong1 = JawapanBetul + (Math.floor(Math.random() * 3) + 1);
        Wrong2 = JawapanBetul - (Math.floor(Math.random() * 2) + 1);
        if (Wrong2 < 1) Wrong2 = JawapanBetul + 4;

        ApplesMissed = 0;
        spawnObjects();
        updateUI();
    }

    function spawnObjects() {
        apples.forEach((apple, index) => {
            apple.y = 180;
            apple.active = true;
            if (apple.id === 1) {
                apple.val = (CorrectPos === 1) ? JawapanBetul : (CorrectPos === 2 ? Wrong1 : Wrong2);
            } else if (apple.id === 2) {
                apple.val = (CorrectPos === 2) ? JawapanBetul : (CorrectPos === 3 ? Wrong1 : Wrong2);
            } else {
                apple.val = (CorrectPos === 3) ? JawapanBetul : (CorrectPos === 1 ? Wrong1 : Wrong2);
            }
        });
    }

    function updateUI() {
        document.getElementById('markah-display').innerText = `Markah: ${Markah}`;
        document.getElementById('soalan-display').innerText = Soalan;
        document.getElementById('bilangan-display').innerText = `Soalan: ${BilanganSoalan}/10`;
        document.getElementById('tahap-display').innerText = `Tahap: ${Tahap}`;
    }

    function endGame() {
        gameState = 'GAMEOVER';
        gameOverScreen.style.display = 'flex';
        document.getElementById('final-score-text').innerText = `TAHNIAH! Permainan Tamat. Markah Anda: ${Markah}`;
    }

    function showSay(element, text, duration) {
        element.innerText = text;
        element.style.display = 'block';
        setTimeout(() => {
            element.style.display = 'none';
        }, duration);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        if (gameState !== 'PLAYING') return;

        // Rabbit movement
        if (keys['ArrowRight'] && rabbit.x < 220) rabbit.x += 7;
        if (keys['ArrowLeft'] && rabbit.x > -220) rabbit.x -= 7;

        // Apples movement
        let anyAppleActive = false;
        apples.forEach(apple => {
            if (apple.active) {
                anyAppleActive = true;
                apple.y -= 3;

                // Collision detection
                if (Math.abs(rabbit.x - apple.x) < 30 && Math.abs(rabbit.y - apple.y) < 30) {
                    apple.active = false;
                    if (apple.val === JawapanBetul) {
                        // Correct
                        const praise = Math.random() > 0.5 ? "Tahniah!" : "Bagus!";
                        showSay(rabbitSay, praise, 1000);
                        Markah++;
                        BilanganSoalan++;
                        BetulBerturut++;
                        if (BetulBerturut === 3) {
                            BetulBerturut = 0;
                            if (Tahap < 3) Tahap++;
                        }
                        // Stop other apples
                        apples.forEach(a => a.active = false);
                        setTimeout(nextQuestion, 1000);
                    } else {
                        // Wrong
                        showSay(rabbitSay, "Cuba Lagi!", 2000);
                        // Respawn objects after 2s pause
                        apples.forEach(a => a.active = false);
                        setTimeout(spawnObjects, 2000);
                    }
                }

                // Hit bottom
                if (apple.y <= -170) {
                    apple.active = false;
                }
            }
        });

        // If all apples missed
        if (anyAppleActive && apples.every(a => !a.active && a.y <= -170)) {
            ApplesMissed++;
            // In original code, it seems it spawns after each apple hits?
            // "if ApplesMissed == 3: broadcast SpawnObjects"
            // But they fall together. So if they all finish:
            spawnObjects();
        } else if (!anyAppleActive && gameState === 'PLAYING') {
             // This case is handled by collision timeouts or initial state
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Background grass
        ctx.fillStyle = '#7cfc00';
        ctx.fillRect(0, 300, 480, 60);

        // Draw Rabbit
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        let rx = rabbit.x + 240;
        let ry = 360 - (rabbit.y + 180);
        ctx.fillText(rabbit.emoji, rx, ry);

        // Rabbit Say Position
        if (rabbitSay.style.display === 'block') {
            rabbitSay.style.left = (rx - 50) + 'px';
            rabbitSay.style.top = (ry - 80) + 'px';
        }

        // Draw Apples
        apples.forEach(apple => {
            if (apple.active) {
                let ax = apple.x + 240;
                let ay = 360 - (apple.y + 180);
                ctx.fillText(apple.emoji, ax, ay);

                // Draw Value on Apple
                ctx.font = 'bold 20px Arial';
                ctx.fillStyle = 'black';
                ctx.fillText(apple.val, ax, ay - 30);
            }
        });
    }

    gameLoop();
</script>

</body>
</html>
